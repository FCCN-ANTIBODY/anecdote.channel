<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>polls you've answered — remember</title>
<style>
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 46rem; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
  h1 { font-size: 1.3rem; } .lede { color: #555; }
  .stage { border: 1px solid #ddd; border-radius: .6rem; padding: .5rem; margin-top: 1rem; }
  .stage > figcaption { font-size: .8rem; color: #777; padding: .2rem .4rem; }
  iframe { width: 100%; height: 30rem; border: 0; border-radius: .4rem; background: #fff; }
</style>
<body>
<h1>Polls you've answered</h1>
<p class="lede">The panel runs in a <strong>powerless <code>data:</code> chamber</strong>. Remembering is
Elevated (the chamber has no storage): the chamber asks the Elevated app to persist and to list. Each
answer connects to the <strong>trove</strong> item it produced, if any — the polls you answered to get your
nonsense.</p>

<figure class="stage">
  <figcaption>▼ powerless data: chamber — remember + list, over the probe line</figcaption>
  <div id="mount"></div>
</figure>

<script type="module">
import { spawnChamber, serveProbeLine } from "./probe-line.mjs";
import { answeredOps, rememberAnswer } from "./answered.mjs";

// A localStorage-backed { get, set, delete } — the domain-scoped store contract (consent.mjs's shape).
const K = "answered-demo:";
const store = {
  get: async (k) => localStorage.getItem(K + k),
  set: async (k, v) => localStorage.setItem(K + k, v),
  delete: async (k) => localStorage.removeItem(K + k),
};

// Seed a trove receipt + a couple of remembered answers so the list + trove join have something to show.
localStorage.setItem(K + "anecdote:trove", JSON.stringify({
  "nonce:demo1": { nonce: "nonce:demo1", label: "keep the library open late", status: "live" },
}));
await rememberAnswer(store, { qr: "pile=cd04-q1&poll=budget&round=1&tok=abc123&type=multichoice&opts=Cut,Keep&guidance=Pick+one.",
  answer: "Keep — and fund evening hours", receipt: "nonce:demo1", ts: "2026-06-30T18:00:00.000Z" });
await rememberAnswer(store, { qr: "pile=cd04-q1&poll=park&round=2&tok=def456&type=open&q=What+should+the+park+have%3F",
  answer: "more shade trees", ts: "2026-06-29T12:00:00.000Z" });

const CHAMBER = `<!doctype html><meta charset=utf-8><title>answered</title>
<style>body{font:14px/1.45 system-ui,sans-serif;margin:.7rem;color:#1a1a1a}
h3{margin:.5rem 0 .3rem;font-size:1rem}ul{list-style:none;padding:0;margin:0}
li{border:1px solid #e3e3e3;border-radius:.4rem;padding:.5rem .7rem;margin:.35rem 0}
.q{font-weight:600}.ans{color:#137333;margin:.15rem 0}.meta{font-size:.72rem;color:#999}
.trove{font-size:.75rem;color:#1967d2;margin-top:.2rem}.solo{font-size:.75rem;color:#999;margin-top:.2rem}
.status{font-size:.68rem;padding:.02rem .35rem;border-radius:1rem;background:#e6f4ea;color:#137333}
.status.revoked{background:#fce8e6;color:#a50e0e}
a{color:#1967d2}button{margin:.4rem 0;border:0;background:#1967d2;color:#fff;border-radius:.4rem;padding:.4rem .8rem;cursor:pointer;font:inherit}
.env{margin-top:.7rem;font-size:.7rem;color:#bbb}</style>
<body><div id=view>loading…</div><button id=add>Remember another answer</button><div class=env id=env></div>
<scr`+`ipt>
(function(){
  var port=null, seq=0, pending={};
  function invoke(op,input,confirmed){return new Promise(function(res){var id="r"+(++seq);pending[id]={res:res,frames:[]};
    port.postMessage({type:"probe.line.request/v1",id:id,op:op,input:input||{},confirmed:!!confirmed});});}
  function onPort(ev){var d=ev.data;if(!d||!d.id)return;var p=pending[d.id];if(!p)return;
    if(d.type==="probe.line.frame/v1"&&d.final){delete pending[d.id];p.res(p.frames);}
    else if(d.type==="probe.line.frame/v1"){p.frames.push(d);}
    else if(d.type==="probe.line.error/v1"){delete pending[d.id];p.res([{error:d.reason}]);}}
  var $=function(id){return document.getElementById(id);};
  var esc=function(s){return String(s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});};
  async function render(){
    var a=(await invoke("poll.answered"))[0].answered||[];
    $("view").innerHTML="<h3>Answered ("+a.length+")</h3><ul>"+a.map(function(r){
      return "<li><div class=q>"+esc(r.question)+"</div>"+
        "<div class=ans>you answered: "+esc(r.answer)+"</div>"+
        "<div class=meta>"+esc(r.pile)+" / "+esc(r.poll)+" · round "+esc(r.round)+" · "+esc(r.answered_at.slice(0,10))+"</div>"+
        (r.trove
          ? "<div class=trove>→ produced trove item: "+esc(r.trove.label)+" <span class='status "+esc(r.trove.status)+"'>"+esc(r.trove.status)+"</span></div>"
          : "<div class=solo>→ no trove item linked (a plain reply)</div>")+
        "</li>";}).join("")+"</ul>";
  }
  addEventListener("message",function(e){
    if(e.data&&e.data.type==="probe.line.init/v1"&&e.ports&&e.ports[0]){
      port=e.ports[0];port.onmessage=onPort;port.start&&port.start();
      $("env").textContent="chamber — subtle:"+(typeof (self.crypto&&self.crypto.subtle))+" · secure:"+isSecureContext+" · origin:"+location.origin;
      $("add").onclick=async function(){
        // Rung 1: the click is the confirmation. Remember a fresh answer, then re-list.
        await invoke("poll.remember",{qr:"pile=cd04-q1&poll=bikes&round=1&tok=ghi789&type=open&q=Where+should+a+bike+lane+go%3F",answer:"along Elm past the school"},true);
        render();
      };
      render();
    }
  });
  if(window.parent!==window) window.parent.postMessage({type:"probe.line.ready/v1"},"*");
})();
</scr`+`ipt>`;

const { port } = await spawnChamber(CHAMBER, { document, targetWindow: window, mount: document.getElementById("mount") });
serveProbeLine(port, { ops: answeredOps({ store }), context: () => ({ recordingOn: true, grants: [] }) });
</script>
