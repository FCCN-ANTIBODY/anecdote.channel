<!doctype html>
<!-- Public holding page for anecdote.channel. The preflight demos (crunch / bench / composer) are
     no longer linked here — they were pulled down from the public surface and repurposed as build
     DIAGNOSTICS: still served as files, still reachable by direct path, but visited on purpose
     (by you, by CI, by the headless verifier) rather than offered to a visitor.

     Append ?diag to this URL to run them: each demo loads in a hidden, offscreen iframe (the
     iframe[id] rule below parks them at -100vw) and the <code> readout becomes a pass/fail rollup
     of whether the instrument cold-loads in each surface. Otherwise the public sees only the
     big centered heading. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>anecdote.channel</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#990049">
<link rel="icon" href="/icon.svg">
<!-- Hold the app shell so anecdote boots with no connection / origin unreachable (sw.js, docs/origin.md). -->
<script>if("serviceWorker" in navigator)addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});</script>
<style>
  :root {
    --io: #ccad31;
    --accent: #990049;
    --accent-fg: #e9d8f7;
    --accent-sh: #000000a0;
    --bg1: #293033;
    --bg2: #274f4b;
    --fg1: #dfdfdf;
    --fg2: #e9daf5;
    --fg-inverse: #040404;
    --sh: #18151a;
    --stroke: #282524;
    --shade-hard: #232224f2;
    --shade: #23222440;
    --border: #00000080;
  }
  html { width: 100vw; min-height: 100vh; place-content: center; }
  html::before {
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(ellipse 100% 100% at 50% bottom, var(--bg2) 0%, var(--bg1) 80%, var(--bg1) 100%), var(--bg1);
    will-change: transform; transform: translateZ(0); contain: paint; image-rendering:auto; backface-visibility:hidden;
  }
  body { display: flex; flex-direction: column; width: max-content; padding: 1rem; margin: auto; color: var(--fg2); }
  code { white-space: pre; font-weight: bolder; font-size: 1.5em; font-family: "Courier New", Courier, monospace; color: var(--fg2); mix-blend-mode: overlay; text-shadow: 0 .15rem 0 var(--sh); }
  body::before { content: ""; position: fixed; inset: 3rem; background-color: var(--shade); box-shadow: 0 0 .5rem var(--border); z-index: -1; pointer-events: none; }
  iframe[id] { position: absolute; width: 1px; height: 1px; left: -100vw; top: -100vh; pointer-events: none; opacity: 0; user-select: none; overflow: hidden; border: none; margin: 0; padding: 0; }
</style>
</head>
<body>
<code id="heading">Please Stand By.</code>

<script type="module">
  // Public default: nothing runs, nothing loads. The heading stands by.
  // ?diag runs the pulled-down demos as build diagnostics in hidden offscreen iframes
  // (the iframe[id] rule parks them offscreen) and rolls their cold-load up into the readout.
  if (new URLSearchParams(location.search).has("diag")) {
    const DIAGS = [
      { id: "diag-crunch",   src: "composer/crunch.html?real=1", name: "crunch" },
      { id: "diag-bench",    src: "composer/bench.html",         name: "bench" },
      { id: "diag-composer", src: "composer/index.html",         name: "composer" },
    ];
    const heading = document.getElementById("heading");
    const state = Object.fromEntries(DIAGS.map((d) => [d.name, "…"]));
    const render = () => {
      heading.textContent =
        "build diagnostics\n" +
        DIAGS.map((d) => `  ${state[d.name].padEnd(4)} ${d.name}`).join("\n");
    };
    render();
    for (const d of DIAGS) {
      const f = document.createElement("iframe");
      f.id = d.id;                     // the id is what the CSS hides offscreen
      f.title = d.name;
      const done = (mark) => { if (state[d.name] === "…") { state[d.name] = mark; render(); } };
      f.addEventListener("load", () => done("ok"));
      f.addEventListener("error", () => done("err"));
      setTimeout(() => done("slow"), 30000);   // didn't finish cold-loading in time
      f.src = d.src;
      document.body.appendChild(f);
    }
  }
</script>
</body>
</html>
