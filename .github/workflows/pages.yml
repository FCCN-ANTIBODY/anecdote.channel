# Publish the preflight to GitHub Pages — the on-device readiness (composer + live "crunch"),
# served static, no build. Nothing transmits a submission yet; this is the instrument getting
# ready in the open. Pages can't set COOP/COEP, which is fine: the vendored onnx runtime is the
# asyncify (single-thread) build that needs no cross-origin isolation.
#
# One-time: Settings → Pages → Source = "GitHub Actions" (this workflow then deploys on push).
name: "Publish · Pages (preflight)"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Serve files as-is (no Jekyll)
        run: touch .nojekyll
      - uses: actions/configure-pages@v5
      - name: Upload site (repo as static files)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4

  purge-cache:
    # Purge Cloudflare AFTER the new artifact is live (needs: deploy), so the next request repopulates
    # from the fresh origin rather than the stale one. anecdote.channel is served as-is (no build), so disk
    # path == url path: we purge exactly the changed files' URLs, falling back to purge-everything only when
    # there's no diff to inspect. A no-op until the CLOUDFLARE_* secrets are set; never fails the deploy.
    if: github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need history to diff the change set
      - name: Purge changed URLs (or everything)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Zone id isn't a credential, so accept it as a repo Variable or a Secret.
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID || secrets.CLOUDFLARE_ZONE_ID }}
          SITE_URL: ${{ vars.SITE_URL || 'https://anecdote.channel' }}
          EVENT: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: scripts/cf-purge.sh
